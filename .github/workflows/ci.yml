name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  XION_CI_ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"

jobs:
  # ===========================================================================
  # Base Jobs (parallel)
  # ===========================================================================
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test --all-features

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy --all-features -- -D warnings

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit
        run: cargo audit

  # ===========================================================================
  # Build Job (depends on base jobs)
  # ===========================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, lint, security-audit]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: xion-toolkit-binary
          path: target/release/xion-toolkit
          retention-days: 1

  # ===========================================================================
  # Skills Tests (depends on build)
  # ===========================================================================
  skills-mock-tests:
    name: Skills Mock Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download xion-toolkit binary
        uses: actions/download-artifact@v4
        with:
          name: xion-toolkit-binary
          path: target/release/

      - name: Install xion-toolkit
        run: |
          chmod +x target/release/xion-toolkit
          sudo ln -sf target/release/xion-toolkit /usr/local/bin/xion-toolkit
          xion-toolkit --version

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Run mock tests
        run: |
          echo "=== Running Skills Mock Tests ==="
          chmod +x tests/skills/run_all.sh
          cd tests/skills && ./run_all.sh
        env:
          MOCK_ENABLED: "true"
          CI: "true"

  skills-lint:
    name: Skills Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Lint test framework
        run: |
          echo "=== Linting test framework ==="
          shellcheck tests/skills/lib.sh tests/skills/run_all.sh

      - name: Lint skill scripts
        run: |
          echo "=== Linting skill scripts ==="
          for script in skills/*/scripts/*.sh; do
            if [[ -f "$script" ]]; then
              echo "Linting $script..."
              shellcheck "$script" || true
            fi
          done

  skills-tests-status:
    name: Skills Tests Status
    runs-on: ubuntu-latest
    needs: [skills-mock-tests, skills-lint]
    if: always()
    steps:
      - name: Check overall status
        run: |
          if [[ "${{ needs.skills-mock-tests.result }}" == "failure" || "${{ needs.skills-lint.result }}" == "failure" ]]; then
            echo "::error::Some skills tests failed"
            exit 1
          fi
          echo "::notice::All skills tests passed"

  # ===========================================================================
  # E2E Tests (depends on build)
  # E2E tests require:
  # - vars.ENABLE_E2E_TESTS = 'true' (repo variable)
  # - secrets.XION_TESTNET_CREDENTIALS (base64 encoded credentials)
  # ===========================================================================
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ vars.ENABLE_E2E_TESTS == 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download xion-toolkit binary
        uses: actions/download-artifact@v4
        with:
          name: xion-toolkit-binary
          path: target/release/

      - name: Install xion-toolkit
        run: |
          chmod +x target/release/xion-toolkit
          sudo ln -sf target/release/xion-toolkit /usr/local/bin/xion-toolkit
          xion-toolkit --version

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Setup credentials
        run: |
          mkdir -p ~/.xion-toolkit/credentials
          echo "${{ secrets.XION_TESTNET_CREDENTIALS }}" | base64 --decode > ~/.xion-toolkit/credentials/testnet.enc

      - name: Run E2E Treasury Lifecycle Test
        run: |
          echo "=== Running Treasury Lifecycle E2E Test ==="
          ./tests/e2e_treasury_lifecycle.sh

      - name: Run E2E Treasury Grant/Fee Test
        run: |
          echo "=== Running Treasury Grant/Fee E2E Test ==="
          ./tests/e2e_treasury_grant_fee.sh

  e2e-status:
    name: E2E Tests Status
    runs-on: ubuntu-latest
    needs: [e2e-tests]
    if: always()
    steps:
      - name: Check overall status
        run: |
          if [[ "${{ needs.e2e-tests.result }}" == "failure" ]]; then
            echo "::error::E2E tests failed"
            exit 1
          fi
          echo "::notice::All E2E tests passed"

  # ===========================================================================
  # Final Status Job
  # ===========================================================================
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [skills-tests-status, e2e-status]
    if: always()
    steps:
      - name: Aggregate all results
        run: |
          echo "=== CI Pipeline Summary ==="
          echo "Skills Tests: ${{ needs.skills-tests-status.result }}"
          echo "E2E Tests: ${{ needs.e2e-status.result }}"
          
          if [[ "${{ needs.skills-tests-status.result }}" == "failure" ]]; then
            echo "::error::Skills tests failed"
            exit 1
          fi
          
          if [[ "${{ needs.e2e-status.result }}" == "failure" ]]; then
            echo "::error::E2E tests failed"
            exit 1
          fi
          
          echo "::notice::All CI checks passed successfully!"
