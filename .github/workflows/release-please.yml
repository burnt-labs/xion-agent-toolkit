# Release Please workflow
# Automates version bumps, CHANGELOG updates, and draft release creation
# https://github.com/googleapis/release-please-action
#
# Flow:
# 1. release-please creates/updates version PR
# 2. When PR merged, release-please creates draft release (no tag due to draft:true)
# 3. trigger-dist manually creates the git tag
# 4. release.yml uploads artifacts to the draft release

name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  release-please:
    # Prevent recursive release PR creation:
    # when merging a "chore(main): release x.y.z" PR, skip release-please
    if: "${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore(main): release') }}"
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.version.outputs.version }}
    
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: main

      # Only needed if we need to read manifest file
      - name: Get version from manifest
        if: ${{ steps.release.outputs.release_created == 'true' }}
        id: version
        run: |
          VERSION="${{ steps.release.outputs.tag_name }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"

  # When draft:true, release-please creates draft release but NO tag
  # We manually create the tag here, then trigger release.yml to upload artifacts
  # Only run on release commits merged to main.
  trigger-dist:
    if: "${{ github.event_name == 'push' && startsWith(github.event.head_commit.message, 'chore(main): release') && (github.event.head_commit.author.username == 'github-actions[bot]' || github.actor == 'github-actions[bot]') }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract tag from release commit message
        id: extract-tag
        run: |
          set -euo pipefail

          MESSAGE="${{ github.event.head_commit.message }}"
          # GitHub release commits may include additional lines like "Co-authored-by: ...".
          # $GITHUB_OUTPUT must be written as a single "key=value" line, so we only parse the first line.
          FIRST_LINE="${MESSAGE%%$'\n'*}"
          TAG="$(printf '%s' "$FIRST_LINE" | sed -E 's/^chore\(main\): release ([0-9]+\.[0-9]+\.[0-9]+).*/\1/')"
          TAG="$(printf '%s' "$TAG" | tr -d '\r')"

          if [ -z "$TAG" ]; then
            echo "Failed to parse release tag from commit message first line: $FIRST_LINE"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: check-tag
        run: |
          TAG="${{ steps.extract-tag.outputs.tag }}"
          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag
        if: ${{ steps.check-tag.outputs.exists == 'false' }}
        run: |
          TAG="${{ steps.extract-tag.outputs.tag }}"
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git tag "$TAG"
          git push origin "$TAG"

      - name: Trigger cargo-dist release workflow
        if: ${{ steps.check-tag.outputs.exists == 'false' }}
        run: |
          TAG="${{ steps.extract-tag.outputs.tag }}"
          echo "Triggering release for tag $TAG"
          gh workflow run "release.yml" --repo "${{ github.repository }}" --ref main -f tag="$TAG"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
