# Release Please workflow
# Automates version bumps, CHANGELOG updates, and draft release creation
# https://github.com/googleapis/release-please-action
#
# Flow:
# 1. release-please creates/updates version PR
# 2. When PR merged, release-please creates draft release (if not skipped)
# 3. trigger-dist manually creates the git tag AND draft release (when release-please is skipped)
# 4. release.yml uploads artifacts to the draft release
#
# Note: When classify detects a release commit, release-please job is skipped to avoid
# re-processing. In this case, trigger-dist creates both the tag and draft release.

name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  # Substring checks like contains(..., 'chore(main): release') skip release-please on
  # unrelated PRs whose squash message mentions that phrase in the body (e.g. #51).
  # Only treat a line as a “release commit” when it matches chore(main): release x.y.z.
  classify:
    runs-on: ubuntu-latest
    outputs:
      skip_release_please: ${{ steps.check.outputs.skip }}
    steps:
      - id: check
        env:
          MSG: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" != "push" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if printf '%s\n' "$MSG" | grep -qE '^chore\(main\): release [0-9]+\.[0-9]+\.[0-9]+'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  # Do not use contains(..., 'chore(main): release') here: routine PR bodies can mention
  # that phrase without a version and would incorrectly skip this job (see PR #52).
  release-please:
    needs: classify
    if: needs.classify.outputs.skip_release_please != 'true'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: main

      - name: Get version from manifest
        if: ${{ steps.release.outputs.release_created == 'true' }}
        id: version
        run: |
          VERSION="${{ steps.release.outputs.tag_name }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"

  # When draft:true, release-please creates draft release but NO tag
  # We manually create the tag here, then trigger release.yml to upload artifacts.
  trigger-dist:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect release merge and extract tag
        id: extract-tag
        run: |
          set -euo pipefail

          subject="$(git log -1 --format=%s HEAD)"
          body="$(git log -1 --format=%B HEAD)"
          author_name="$(git log -1 --format=%an HEAD)"

          TAG=""
          if printf '%s' "$subject" | grep -qE '^chore\(main\): release [0-9]+\.[0-9]+\.[0-9]+'; then
            TAG="$(printf '%s' "$subject" | sed -E 's/^chore\(main\): release ([0-9]+\.[0-9]+\.[0-9]+).*/\1/')"
          fi
          if [ -z "$TAG" ]; then
            TAG="$(printf '%s\n' "$body" | grep -E '^chore\(main\): release [0-9]+\.[0-9]+\.[0-9]+' | head -1 | sed -E 's/^chore\(main\): release ([0-9]+\.[0-9]+\.[0-9]+).*/\1/' || true)"
          fi

          parent_count="$(git rev-list --parents -n 1 HEAD | awk '{print NF-1}')"
          if [ -z "$TAG" ] && [ "${parent_count}" -eq 2 ]; then
            s2="$(git log -1 --format=%s 'HEAD^2')"
            if printf '%s' "$s2" | grep -qE '^chore\(main\): release [0-9]+\.[0-9]+\.[0-9]+'; then
              TAG="$(printf '%s' "$s2" | sed -E 's/^chore\(main\): release ([0-9]+\.[0-9]+\.[0-9]+).*/\1/')"
            fi
          fi

          TAG="$(printf '%s' "${TAG:-}" | tr -d '\r')"
          if [ -z "$TAG" ]; then
            echo "Not a release merge commit; skipping tag and dist trigger."
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          trusted=0
          if [ "$author_name" = "github-actions[bot]" ]; then
            trusted=1
          elif printf '%s' "$subject" | grep -qE '^Merge pull request #[0-9]+ from .+/release-please'; then
            trusted=1
          fi

          if [ "$trusted" -ne 1 ]; then
            echo "Parsed tag $TAG but commit is not a trusted release merge (author=$author_name); skipping."
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "is_release=true" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        if: ${{ steps.extract-tag.outputs.is_release == 'true' }}
        id: check-tag
        run: |
          TAG="${{ steps.extract-tag.outputs.tag }}"
          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag
        if: ${{ steps.extract-tag.outputs.is_release == 'true' && steps.check-tag.outputs.exists == 'false' }}
        run: |
          TAG="${{ steps.extract-tag.outputs.tag }}"
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create draft release if not exists
        if: ${{ steps.extract-tag.outputs.is_release == 'true' }}
        id: create-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.extract-tag.outputs.tag }}"
          # Check if release already exists
          if gh release view "$TAG" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "Release $TAG already exists, skipping creation"
            echo "release_created=false" >> "$GITHUB_OUTPUT"
          else
            echo "Creating draft release for $TAG"
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "$TAG" \
              --draft \
              --generate-notes
            echo "release_created=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger cargo-dist release workflow
        if: ${{ steps.extract-tag.outputs.is_release == 'true' && steps.create-release.outputs.release_created == 'true' }}
        run: |
          TAG="${{ steps.extract-tag.outputs.tag }}"
          echo "Triggering release for tag $TAG"
          gh workflow run "release.yml" --repo "${{ github.repository }}" --ref main -f tag="$TAG"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
