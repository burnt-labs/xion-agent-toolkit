name: Skills Tests

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'skills/**'
      - 'tests/skills/**'
      - '.github/workflows/test-skills.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'skills/**'
      - 'tests/skills/**'
      - '.github/workflows/test-skills.yml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ===========================================================================
  # Mock Tests - Fast, runs on every PR and push
  # ===========================================================================
  mock-tests:
    name: Mock Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
      
      - name: Validate test framework
        run: |
          echo "::group::Validate lib.sh"
          shellcheck tests/skills/lib.sh
          echo "::endgroup::"
          
          echo "::group::Validate run_all.sh"
          shellcheck tests/skills/run_all.sh
          echo "::endgroup::"
      
      - name: Run mock tests
        run: |
          echo "=== Running Skills Mock Tests ==="
          chmod +x tests/skills/run_all.sh
          ./tests/skills/run_all.sh --mock-only

  # ===========================================================================
  # Lint - Check all bash scripts
  # ===========================================================================
  lint:
    name: Lint Shell Scripts
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
      
      - name: Lint test framework
        run: |
          echo "::group::Lint lib.sh"
          shellcheck tests/skills/lib.sh
          echo "::endgroup::"
          
          echo "::group::Lint run_all.sh"
          shellcheck tests/skills/run_all.sh
          echo "::endgroup::"
      
      - name: Lint skill scripts
        run: |
          for script in skills/*/scripts/*.sh; do
            if [[ -f "$script" ]]; then
              echo "::group::Lint $script"
              shellcheck "$script" || true  # Don't fail on skill script issues
              echo "::endgroup::"
            fi
          done

  # ===========================================================================
  # Summary - Combined status for branch protection
  # ===========================================================================
  skills-tests-status:
    name: Skills Tests Status
    runs-on: ubuntu-latest
    needs: [mock-tests]
    if: always()
    steps:
      - name: Check overall status
        run: |
          if [[ "${{ needs.mock-tests.result }}" == "failure" ]]; then
            echo "::error::Mock tests failed"
            exit 1
          fi
          echo "::notice::All mock tests passed"
