name: Skills Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'skills/**'
      - 'tests/skills/**'
      - '.github/workflows/test-skills.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'skills/**'
      - 'tests/skills/**'
      - '.github/workflows/test-skills.yml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ===========================================================================
  # Mock Tests - Download binary from CI or build locally
  # ===========================================================================
  mock-tests:
    name: Mock Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download xion-toolkit binary from CI
        uses: actions/download-artifact@v4
        with:
          name: xion-toolkit-binary
          path: target/release/
        continue-on-error: true
        id: download-binary

      - name: Build xion-toolkit (fallback)
        if: steps.download-binary.outcome == 'failure'
        run: |
          echo "::warning::Binary artifact not available, building from source..."
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"
          cargo build --release

      - name: Install xion-toolkit
        run: |
          chmod +x target/release/xion-toolkit
          sudo ln -sf target/release/xion-toolkit /usr/local/bin/xion-toolkit
          xion-toolkit --version

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Run mock tests
        run: |
          echo "=== Running Skills Mock Tests ==="
          chmod +x tests/skills/run_all.sh
          cd tests/skills && ./run_all.sh
        env:
          MOCK_ENABLED: "true"
          CI: "true"
          XION_CI_ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"

  # ===========================================================================
  # Lint - Check all bash scripts
  # ===========================================================================
  lint:
    name: Lint Shell Scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Lint test framework
        run: |
          echo "=== Linting test framework ==="
          shellcheck tests/skills/lib.sh tests/skills/run_all.sh

      - name: Lint skill scripts
        run: |
          echo "=== Linting skill scripts ==="
          for script in skills/*/scripts/*.sh; do
            if [[ -f "$script" ]]; then
              echo "Linting $script..."
              shellcheck "$script" || true
            fi
          done

  # ===========================================================================
  # Summary - Combined status for branch protection
  # ===========================================================================
  skills-tests-status:
    name: Skills Tests Status
    runs-on: ubuntu-latest
    needs: [mock-tests, lint]
    if: always()
    steps:
      - name: Check overall status
        run: |
          if [[ "${{ needs.mock-tests.result }}" == "failure" || "${{ needs.lint.result }}" == "failure" ]]; then
            echo "::error::Some tests failed"
            exit 1
          fi
          echo "::notice::All skills tests passed"
